<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inverter Info - Tesla Solar Charger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <h1>&#9889; Tesla Solar Charger</h1>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/inverter.html" class="active">Inverter</a>
            <a href="/vehicle.html" id="vehicle-tab">Vehicle</a>
            <a href="/settings.html">Settings</a>
            <a href="/logger.html">Logger</a>
            <a href="/help.html">Help</a>
        </div>
    </nav>

    <main>
        <!-- Battery bank details -->
        <div class="section">
            <h2>Battery Banks</h2>
            <div class="battery-grid" id="battery-banks"></div>
        </div>

        <!-- Inverter info -->
        <div class="section">
            <h2>Inverter</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">Temperature</span>
                    <span class="info-value" id="inv-temp">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Load %</span>
                    <span class="info-value" id="inv-load">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Mode</span>
                    <span class="info-value" id="inv-mode">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">AC Output</span>
                    <span class="info-value" id="inv-ac">--</span>
                </div>
            </div>
        </div>

        <!-- Energy today -->
        <div class="section">
            <h2>Energy Today</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">Solar Yield</span>
                    <span class="info-value" id="energy-pv">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Grid Import</span>
                    <span class="info-value" id="energy-grid-in">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Grid Export</span>
                    <span class="info-value" id="energy-grid-out">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Battery In</span>
                    <span class="info-value" id="energy-bat-in">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Battery Out</span>
                    <span class="info-value" id="energy-bat-out">--</span>
                </div>
            </div>
        </div>

    </main>

    <script src="/js/nav.js"></script>
    <script src="/js/inverter.js"></script>
</body>
</html>
